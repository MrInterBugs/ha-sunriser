backup:
  name: Download Backup
  description: >
    Download a complete backup of all device configuration and save it as a
    .msgpack file in your Home Assistant /config directory. Returns the saved
    file path so you can use it with the restore service later.
  fields: {}

restore:
  name: Restore Backup
  description: >
    Restore device configuration from a previously downloaded backup file.
    The device performs a deep restart after applying the config. Use the
    file path returned by the backup service.
  fields:
    file_path:
      name: File path
      description: >
        Absolute path to the .msgpack backup file
        (e.g. /config/sunriser_backup_20260323_120000.msgpack).
      required: true
      example: /config/sunriser_backup_20260323_120000.msgpack
      selector:
        text: {}

get_errors:
  name: Get Error Log
  description: >
    Retrieve the device error log. Returns a dict with a "content" key
    containing the raw log text.
  fields: {}

get_log:
  name: Get Diagnostic Log
  description: >
    Retrieve the device diagnostic log. Returns a dict with a "content" key
    containing the raw log text.
  fields: {}

get_dayplanner_schedule:
  name: Get Day Planner Schedule
  description: >
    Read the current day planner schedule for a PWM channel. Returns a dict
    with "pwm" and "markers" keys. Each marker has "time" (HH:MM) and
    "percent" (0–100).
  fields:
    pwm:
      name: PWM channel
      description: PWM channel number (1–10).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 10
          mode: box

set_dayplanner_schedule:
  name: Set Day Planner Schedule
  description: >
    Replace the day planner schedule for a PWM channel. The device will follow
    the new schedule from the next minute boundary. Provide at least one marker.
  fields:
    pwm:
      name: PWM channel
      description: PWM channel number (1–10).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 10
          mode: box
    markers:
      name: Markers
      description: >
        List of schedule markers. Each marker needs "time" (HH:MM, 24-hour)
        and "percent" (0–100). The device interpolates linearly between markers.
      required: true
      example:
        - time: "06:00"
          percent: 0
        - time: "08:00"
          percent: 100
        - time: "20:00"
          percent: 100
        - time: "22:00"
          percent: 0
      selector:
        object: {}

get_weekplanner_schedule:
  name: Get Week Planner Schedule
  description: >
    Read the current week planner program assignment for a PWM channel. Returns
    a dict with "pwm", "name", "color_id", and "schedule" keys. The schedule maps
    day names (sunday, monday, …, saturday, default) to program IDs (integers).
    "default" is the fallback program used on days with no explicit assignment.
  fields:
    pwm:
      name: PWM channel
      description: PWM channel number (1–10).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 10
          mode: box

set_weekplanner_schedule:
  name: Set Week Planner Schedule
  description: >
    Write the week planner program assignment for a PWM channel. Provide a
    "schedule" dict mapping day names (sunday, monday, tuesday, wednesday,
    thursday, friday, saturday, default) to program IDs. Omitted days default
    to 0 (no program). "default" is the fallback used on unassigned days.
  fields:
    pwm:
      name: PWM channel
      description: PWM channel number (1–10).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 10
          mode: box
    schedule:
      name: Schedule
      description: >
        Dict mapping day names to program IDs (integers). Include only the days
        you want to set; omitted days are written as 0 (no program).
      required: true
      example:
        monday: 1
        tuesday: 1
        wednesday: 1
        thursday: 1
        friday: 1
        saturday: 2
        sunday: 2
        default: 1
      selector:
        object: {}

download_factory_backup:
  name: Download Factory Backup
  description: >
    Download the factory default configuration from the device and save it as a
    .msgpack file in your Home Assistant /config directory. Returns the saved
    file path.
  fields: {}

download_firmware:
  name: Download Firmware Info
  description: >
    Download the firmware info blob (GET /firmware.mp) from the device and save
    it as a .msgpack file in /config. Developer/diagnostic use only.
  fields: {}

download_bootload:
  name: Download Bootload Info
  description: >
    Download the bootload info blob (GET /bootload.mp) from the device and save
    it as a .msgpack file in /config. Developer/diagnostic use only.
  fields: {}

factory_reset:
  name: Factory Reset
  description: >
    Reset ALL device configuration to factory defaults (DELETE /). This is
    irreversible — all PWM settings, schedules, and network config will be wiped.
    You must pass confirm: true to proceed.
  fields:
    confirm:
      name: Confirm
      description: Must be set to true to execute the reset.
      required: true
      example: true
      selector:
        boolean: {}
